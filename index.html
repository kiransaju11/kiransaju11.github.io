<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kiran | Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }

body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(-45deg, #0f172a, #1e293b, #0ea5e9, #6366f1);
    background-size: 400% 400%;
    animation: gradientMove 12s ease infinite;
    color: #fff;
    scroll-behavior: smooth;
}

/* gradient animation */
@keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* glow overlay */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background:
        radial-gradient(circle at 20% 30%, rgba(56,189,248,0.25), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(99,102,241,0.25), transparent 40%);
    z-index: -1;
}

/* particles */
#particles-js {
    position: fixed;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
    z-index: -1;
    opacity: 0.5;
}

/* cursor */
.cursor {
    position: fixed;
    width: 12px;
    height: 12px;
    background: #38bdf8;
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
}

.cursor-glow {
    position: fixed;
    width: 35px;
    height: 35px;
    background: rgba(56,189,248,0.2);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9998;
}

/* header */
header {
    position: fixed;
    width: 100%;
    background: rgba(15,23,42,0.85);
    padding: 15px;
    text-align: center;
    z-index: 1000;
}

header a {
    margin: 0 15px;
    color: #38bdf8;
    text-decoration: none;
}

/* sections */
section {
    padding: 100px 20px;
    text-align: center;
}

h1 { font-size: 3rem; color: #38bdf8; }
h2 { margin-bottom: 20px; }

/* cards */
.card {
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.2);
    padding: 20px;
    margin: 20px;
    max-width: 350px;
    border-radius: 18px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.35);
    transform-style: preserve-3d;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.03);
    box-shadow: 0 20px 60px rgba(56,189,248,0.4);
}

.icon {
    font-size: 30px;
    color: #38bdf8;
    text-shadow: 0 0 10px #38bdf8;
}

/* grid */
.grid {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
}

/* buttons */
.btn {
    display: inline-block;
    padding: 10px 18px;
    margin-top: 10px;
    margin-right: 8px;
    background: #38bdf8;
    color: #000;
    border-radius: 6px;
    text-decoration: none;
}

.linkedin {
    background: #0a66c2;
    color: white;
}

/* fade */
.fade {
    opacity: 0;
    transform: translateY(20px);
    transition: 1s;
}

.fade.show {
    opacity: 1;
    transform: translateY(0);
}
</style>
</head>

<body>

<div id="particles-js"></div>
<div class="cursor"></div>
<div class="cursor-glow"></div>

<header>
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#projects">Projects</a>
    <a href="#contact">Contact</a>
</header>

<section id="home">
    <h1>Hi, I'm Kiran 👋</h1>
    <p id="typing"></p>
</section>

<section id="about" class="fade">
    <h2>About Me</h2>
    <p>I build cool stuff combining electronics + code.</p>
</section>

<section id="projects" class="fade">
    <h2>Projects</h2>
    <div class="grid">

        <div class="card">
            <span class="icon">🧤</span>
            <h3>Gesture Control Glove</h3>
            <a class="btn" href="https://github.com/kiransaju11/gesture-glove">GitHub</a>
            <a class="btn linkedin" href="https://www.linkedin.com/feed/update/urn:li:activity:7373797165611114496/?originTrackingId=v8aPlmFt3N%2F4gzBGZzEOFA%3D%3D">LinkedIn</a>
        </div>

        <div class="card">
            <span class="icon">🐍</span>
            <h3>Python Turtle</h3>
            <a class="btn" href="https://github.com/kiransaju11/python_turtle">GitHub</a>
            <a class="btn linkedin" href="https://www.linkedin.com/feed/update/urn:li:activity:7355126419825295360/?originTrackingId=V14P7bJ3YS%2FVTfdY4hJO4Q%3D%3D">LinkedIn</a>
        </div>

        <div class="card">
            <span class="icon">🧠</span>
            <h3>Math Quiz</h3>
            <a class="btn" href="#">GitHub</a>
            <a class="btn linkedin" href="https://www.linkedin.com/feed/update/urn:li:activity:7364713344672456704/?originTrackingId=SirFW4DjoHY9QdcZl61rdw%3D%3D">LinkedIn</a>
        </div>

    </div>
</section>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

<script>
// particles
particlesJS("particles-js", {
  particles: {
    number: { value: 120 },
    color: { value: ["#38bdf8", "#818cf8", "#22d3ee"] },
    line_linked: { enable: true },
    move: { speed: 1.5 }
  },
  interactivity: {
    events: { onhover: { enable: true, mode: "grab" } }
  }
});

// typing
const text = "ECE Student | AI/ML | Builder";
let i = 0;
function type() {
    if (i < text.length) {
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(type, 50);
    }
}
type();

// cursor
document.addEventListener("mousemove", e => {
    document.querySelector(".cursor").style.left = e.clientX + "px";
    document.querySelector(".cursor").style.top = e.clientY + "px";
    document.querySelector(".cursor-glow").style.left = e.clientX + "px";
    document.querySelector(".cursor-glow").style.top = e.clientY + "px";
});

// fade
window.addEventListener("scroll", () => {
    document.querySelectorAll(".fade").forEach(el => {
        if (el.getBoundingClientRect().top < window.innerHeight - 50) {
            el.classList.add("show");
        }
    });
});
</script>

</body>
</html>
